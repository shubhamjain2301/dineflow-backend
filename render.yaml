services:
  - type: web
    name: dineflow-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false   # Set this manually in Render dashboard
    healthCheckPath: /health
    autoDeploy: true
